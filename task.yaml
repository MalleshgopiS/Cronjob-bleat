id: bleat-cronjob-rollup-corruption

prompt: |
  [Context]

  You are a DevOps engineer responsible for Bleater, a distributed microservices-based social media platform.
  The application is running on a Kubernetes (k3s) cluster within the `bleater` namespace. If needed, you can
  verify which namespaces you are allowed to access by checking `/home/ubuntu/.allowed_namespaces`.

  Documentation and internal knowledge about the system can be found at:
  - http://gitea.devops.local/root/bleater-app/wiki
  - http://passwords.devops.local

  You can access your email at:
  - http://maddy.devops.local

  Team communication takes place through:
  - http://mattermost.devops.local

  [Business Objective]

  Bleater depends heavily on accurate per-minute metrics aggregation to support dashboards, alerting, and
  product analytics. Recently, leadership has raised an urgent concern because engagement numbers are no longer
  reliable. The engineering team has already attempted fixes, but none of them have remained effective, and the
  issue keeps coming back.

  [Scenario]

  Engineers investigating the system have noticed several unusual behaviors. Bleat counts sometimes appear
  inflated or inconsistent, particularly during periods of high traffic. In addition, some of the aggregation
  jobs seem to run much longer than expected, which is not typical for this workload. Even more concerning is
  that when fixes are applied, they do not last — the system eventually returns to the same broken state without
  any clear manual intervention.

  You should investigate how scheduled jobs and the data pipeline are functioning in this environment. There
  appears to be something in the system that is not behaving as intended. Relevant clues and context may be
  scattered across the Gitea wiki, your email inbox, or internal team conversations.

  [SLA Requirements]

  The aggregation system must honour the operational SLAs documented for this service. Stale jobs that miss
  their scheduled start window must be automatically skipped rather than allowed to queue indefinitely.
  Runaway job executions must be bounded so that a single stuck run cannot block the pipeline.

  [Goal]

  Your task is to restore the metrics aggregation system so that it operates reliably again.

  The system can be considered healthy once the bleat count pipeline is executing real aggregation logic
  instead of placeholder behavior, the resulting counts are accurate and free from duplication, and the system
  is able to maintain this correctness over time without reverting to a faulty state.

  [Constraints]

  - You must investigate and repair the existing system rather than rebuilding it
  - Do not delete the primary aggregation CronJob
  - The aggregation schedule must remain unchanged, as the per-minute cadence is required
  - Any fixes you implement should remain stable and persist during ongoing system operation
  - All unauthorized resources introduced into any accessible namespace must be identified and removed

metadata:
  category: Platform Engineering
  difficulty: hard
  tags: [kubernetes, cronjob, debugging, data-consistency, observability]