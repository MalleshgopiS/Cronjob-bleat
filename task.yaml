id: bleat-cronjob-rollup-corruption

prompt: |
  [Context]

  You are a DevOps engineer working on Bleater, a distributed microservices-based social media platform.
  Bleater is deployed on Kubernetes (k3s) in the `bleater` namespace. You can check allowed namespaces at `/home/ubuntu/.allowed_namespaces`.

  Information about the application and infrastructure is available at:
  - http://gitea.devops.local/root/bleater-app/wiki
  - http://passwords.devops.local

  Your email is available at:
  - http://maddy.devops.local

  Internal communication happens via:
  - http://mattermost.devops.local

  [Business Objective]

  Bleater relies on accurate hourly metrics aggregation to power dashboards, alerts, and product analytics.
  Leadership has raised an urgent incident — engagement numbers are wrong, and the engineering team cannot
  determine why previously applied fixes keep failing to hold.

  [Scenario]

  Engineers have reported the following symptoms:
  - Bleat counts appear doubled or inconsistent during high traffic periods
  - Some aggregation jobs appear to run far longer than expected
  - Fixes applied to the system do not seem to persist — the system reverts to a broken state on its own

  Investigate the platform's scheduled jobs and data pipeline. Something in the environment is not behaving
  as expected. You may find useful context in the Gitea wiki, your email, or the internal chat.

  [Goal]

  Restore the metrics aggregation system to reliable operation.

  The system is considered healthy when bleat counts are accurate and non-duplicated,
  and the fix remains stable under continued system operation.

  [Constraints]

  - Investigate and fix the existing system; do not recreate it
  - Do not delete the primary aggregation CronJob
  - Ensure your changes remain durable under continued system operation

metadata:
  category: Platform Engineering
  difficulty: hard
  tags: [kubernetes, cronjob, debugging, data-consistency, observability]
