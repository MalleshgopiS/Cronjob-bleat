id: bleat-cronjob-rollup-corruption

prompt: |
  [Context]

  You are a DevOps engineer working on Bleater, a distributed microservices-based social media platform.
  Bleater is deployed on Kubernetes (k3s) in the `bleater` namespace. You can check allowed namespaces at `/home/ubuntu/.allowed_namespaces`.

  Information about the application and infrastructure is available at:
  - http://gitea.devops.local/root/bleater-app/wiki
  - http://passwords.devops.local

  Your email is available at:
  - http://maddy.devops.local

  Internal communication happens via:
  - http://mattermost.devops.local

  [Business Objective]

  Bleater relies on accurate hourly metrics aggregation to power dashboards, alerts, and product analytics.
  Recently, leadership has raised concerns about incorrect engagement numbers being reported during peak traffic.

  [Scenario]

  The platform uses a Kubernetes CronJob in the `bleater` namespace to aggregate hourly metrics into a centralized datastore.

  Engineers have observed the following issues:
  - Bleat counts appear doubled during high traffic periods
  - Aggregation jobs sometimes run longer than expected and never terminate
  - Fixes applied previously do not persist — the system reverts to a broken state

  Initial investigation suggests that multiple aggregation jobs may be running concurrently,
  leading to conflicting updates in the metrics store. The CronJob configuration is suspected to
  be missing proper concurrency controls and execution time limits.

  The system already contains:
  - A CronJob responsible for aggregation
  - Supporting resources for storing aggregated data
  - Additional scheduled jobs and resources that may or may not be relevant

  However, several components are misconfigured, partially correct, or actively interfering with the intended behavior.

  Some resources in the environment may appear correct but are not actually used by the system.
  Others are actively working against the system and must be removed.

  [Goals]

  Restore correct and reliable metrics aggregation behavior.

  The system is considered healthy when:

  - The primary CronJob has concurrency controls preventing simultaneous runs
  - The primary CronJob has execution time limits to prevent runaway jobs
  - Aggregation jobs do not overlap in execution
  - Only one aggregation job runs at any given time
  - Metrics data remains consistent and is not duplicated
  - The system remains stable over multiple execution cycles

  [Constraints]

  - Investigate and fix the existing system; do not recreate it
  - Do not delete the primary aggregation CronJob
  - Avoid hardcoding assumptions about resource names where possible
  - Identify and remove any scheduled resources that are actively interfering with correct system behavior
  - Ensure fixes persist even under repeated execution conditions

metadata:
  category: Platform Engineering
  difficulty: hard
  tags: [kubernetes, cronjob, debugging, data-consistency, observability]
